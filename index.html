<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: #0d0d0d; font-family: 'Space Grotesk', sans-serif; color: #f7f7f2; }

:root {
  --brat: #c5f135;
  --brat-dark: #9ec40f;
  --ink: #0d0d0d;
  --ink2: #1a1a1a;
  --white: #f7f7f2;
  --muted: #888;
}

/* ── NAV ── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 64px;
  background: var(--ink);
  border-bottom: 1px solid #1e1e1e;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.5px;
  color: var(--brat);
}
.logo span { color: var(--white); }
.nav-links { display: flex; gap: 40px; list-style: none; }
.nav-links a {
  color: var(--white);
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.nav-links a:hover { opacity: 1; }
.btn-nav {
  background: var(--brat);
  color: var(--ink);
  border: none;
  padding: 11px 26px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: transform 0.15s, background 0.15s;
}
.btn-nav:hover { background: var(--brat-dark); transform: translateY(-1px); }

/* ── HERO ── */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 680px;
  background: var(--brat);
}
.hero-left { padding: 100px 64px; display: flex; flex-direction: column; justify-content: center; }
.hero-tag {
  display: inline-block;
  background: var(--ink);
  color: var(--brat);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 5px 14px;
  margin-bottom: 32px;
  width: fit-content;
}
.hero-left h1 {
  font-size: 80px;
  font-weight: 700;
  line-height: 1.0;
  letter-spacing: -3px;
  color: var(--ink);
  margin-bottom: 24px;
}
.hero-left p {
  font-size: 19px;
  line-height: 1.65;
  color: rgba(13,13,13,0.6);
  margin-bottom: 44px;
  max-width: 440px;
}
.btn-dark {
  background: var(--ink);
  color: var(--brat);
  border: none;
  padding: 18px 44px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: transform 0.15s, box-shadow 0.15s;
  width: fit-content;
}
.btn-dark:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.hero-right {
  background: rgba(0,0,0,0.14);
  display: flex;
  align-items: center;
  justify-content: center;
}
.img-placeholder {
  width: 360px;
  height: 440px;
  border: 2px dashed rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: rgba(0,0,0,0.3);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  text-align: center;
  line-height: 1.6;
}

/* ── MARQUEE ── */
.marquee-wrap {
  overflow: hidden;
  background: var(--ink2);
  border-top: 1px solid #1e1e1e;
  border-bottom: 1px solid #1e1e1e;
  padding: 18px 0;
}
.marquee-track {
  display: flex;
  animation: marquee 20s linear infinite;
  white-space: nowrap;
}
.marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  padding: 0 40px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #3a3a3a;
  text-transform: uppercase;
}
.marquee-dot { width: 6px; height: 6px; background: var(--brat); border-radius: 50%; flex-shrink: 0; }
@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ── SECTIONS ── */
.section { padding: 100px 64px; border-top: 1px solid #1e1e1e; }
.section.alt { background: #0f0f0f; }
.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--brat);
  margin-bottom: 16px;
}
.section-title {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1.05;
  margin-bottom: 64px;
  max-width: 640px;
}
.section-title em { font-style: normal; color: var(--brat); }

/* ── FEATURES ── */
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}
.feature-card {
  background: var(--ink2);
  padding: 40px 36px;
  border: 1px solid #1e1e1e;
  transition: border-color 0.2s;
}
.feature-card:hover { border-color: var(--brat); }
.feature-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--brat);
  margin-bottom: 20px;
}
.feature-card h3 { font-size: 22px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
.feature-card p { font-size: 15px; line-height: 1.7; color: var(--muted); }

/* ── HOW IT WORKS ── */
.how-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
}
.how-num {
  width: 56px;
  height: 56px;
  background: var(--brat);
  color: var(--ink);
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}
.how-step h3 { font-size: 20px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.3px; }
.how-step p { font-size: 15px; line-height: 1.65; color: var(--muted); }

/* ── TESTIMONIALS ── */
.testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.testimonial-card {
  background: var(--ink2);
  border: 1px solid #222;
  padding: 36px;
  position: relative;
}
.testimonial-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 28px;
  font-size: 80px;
  color: var(--brat);
  opacity: 0.15;
  font-family: Georgia, serif;
  line-height: 1;
}
.testimonial-text { font-size: 16px; line-height: 1.7; margin-bottom: 24px; }
.testimonial-author { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #222;
  border: 1.5px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--brat);
  flex-shrink: 0;
}
.author-name { font-size: 14px; font-weight: 600; }
.author-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── PRICING ── */
.pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.pricing-card {
  background: var(--ink2);
  border: 1px solid #222;
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.pricing-card.featured { border-color: var(--brat); background: #131a07; }
.featured-badge {
  position: absolute;
  top: -13px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--brat);
  color: var(--ink);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 16px;
  white-space: nowrap;
}
.plan-name { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
.plan-price { font-size: 58px; font-weight: 700; letter-spacing: -2px; line-height: 1; margin-bottom: 6px; }
.plan-price sup { font-size: 22px; vertical-align: super; }
.plan-period { font-size: 14px; color: var(--muted); margin-bottom: 36px; }
.plan-features { list-style: none; flex: 1; margin-bottom: 36px; display: flex; flex-direction: column; gap: 13px; }
.plan-features li { font-size: 15px; color: var(--muted); display: flex; align-items: flex-start; gap: 10px; }
.plan-features li::before { content: '→'; color: var(--brat); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.btn-plan {
  background: transparent;
  color: var(--white);
  border: 1.5px solid #333;
  padding: 15px 24px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.02em;
}
.btn-plan:hover { border-color: var(--brat); color: var(--brat); }
.btn-plan.featured-btn { background: var(--brat); color: var(--ink); border-color: var(--brat); }
.btn-plan.featured-btn:hover { background: var(--brat-dark); }

/* ── FAQ ── */
.faq-list { max-width: 820px; }
.faq-item { border-bottom: 1px solid #222; }
.faq-q {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0;
  cursor: pointer;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  gap: 24px;
  user-select: none;
  transition: color 0.15s;
}
.faq-q:hover { color: var(--brat); }
.faq-icon {
  width: 28px;
  height: 28px;
  border: 1.5px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  color: var(--brat);
  font-weight: 300;
}
.faq-a { font-size: 15px; line-height: 1.75; color: var(--muted); padding-bottom: 28px; }

/* ── CTA BANNER ── */
.cta-banner {
  background: var(--brat);
  color: var(--ink);
  padding: 100px 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 48px;
}
.cta-banner h2 {
  font-size: 58px;
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1.0;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid #1e1e1e;
  padding: 72px 64px 48px;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
}
.footer-brand p { font-size: 14px; line-height: 1.6; color: var(--muted); max-width: 260px; margin-top: 16px; }
.footer-col h4 {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}
.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer-col ul a { font-size: 14px; color: #555; text-decoration: none; transition: color 0.15s; }
.footer-col ul a:hover { color: var(--brat); }
.footer-bottom {
  border-top: 1px solid #1e1e1e;
  margin: 0 64px;
  padding: 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  color: #444;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .nav { padding: 20px 24px; }
  .nav-links { display: none; }
  .hero { grid-template-columns: 1fr; }
  .hero-right { display: none; }
  .hero-left { padding: 64px 24px; }
  .hero-left h1 { font-size: 52px; letter-spacing: -2px; }
  .section { padding: 64px 24px; }
  .section-title { font-size: 36px; }
  .features-grid { grid-template-columns: 1fr; }
  .how-grid { grid-template-columns: 1fr 1fr; }
  .testimonials-grid { grid-template-columns: 1fr; }
  .pricing-grid { grid-template-columns: 1fr; }
  footer { grid-template-columns: 1fr 1fr; padding: 48px 24px; }
  .footer-bottom { margin: 0 24px; flex-direction: column; gap: 8px; text-align: center; }
  .cta-banner { flex-direction: column; padding: 64px 24px; }
  .cta-banner h2 { font-size: 40px; }
}
</style>
</head>
<body>
<script type="text/babel">
const { useState } = React;

const features = [
  { title: 'Personalized Plan', desc: 'Get a step-by-step homeownership roadmap built around your income, goals, and timeline.' },
  { title: 'Financial Guidance', desc: 'Understand mortgages, down payments, and closing costs with plain-language coaching.' },
  { title: 'Expert Community', desc: 'Connect with certified housing advisors and a network of fellow first-time buyers.' },
  { title: 'Market Insights', desc: 'Access real-time neighborhood data and property value trends in your target area.' },
  { title: 'Document Hub', desc: 'Organize your paperwork, checklists, and timelines in one secure place.' },
  { title: 'Credit Building', desc: 'Track and improve your credit score with tailored tips from housing finance experts.' },
];

const steps = [
  { title: 'Sign Up Free', desc: 'Create your profile in under 2 minutes. No credit card required.' },
  { title: 'Get Assessed', desc: 'Answer a few questions. We map your readiness and build your plan.' },
  { title: 'Learn & Track', desc: 'Work through your personalized curriculum and hit your milestones.' },
  { title: 'Close the Deal', desc: 'Get matched with verified agents and lenders to buy your home.' },
];

const testimonials = [
  { text: 'Kute Nest made the whole homebuying process feel actually possible. I went from "no idea" to keys in hand in 11 months.', name: 'Sarah M.', meta: 'First-time buyer, Austin TX', initial: 'S' },
  { text: "I always thought I needed a huge down payment. Kute Nest showed me programs I never knew existed. Game changer.", name: 'Marcus T.', meta: 'Homeowner since 2024', initial: 'M' },
  { text: "The credit coaching alone was worth every penny. My score went up 80 points in 6 months.", name: 'Priya R.', meta: 'New homeowner, Phoenix AZ', initial: 'P' },
];

const plans = [
  { name: 'Starter', price: null, period: 'Free forever', features: ['Readiness assessment', 'Basic roadmap', 'Community access', 'Monthly newsletter'], featured: false },
  { name: 'Growth', price: '29', period: 'per month', features: ['Full personalized plan', 'Financial coaching', 'Document hub', 'Market data access', 'Priority support'], featured: true },
  { name: 'Concierge', price: '99', period: 'per month', features: ['Everything in Growth', '1-on-1 advisor sessions', 'Lender & agent matching', 'Unlimited revisions', 'White-glove close support'], featured: false },
];

const faqs = [
  { q: 'Do I need to be a first-time buyer?', a: 'Not at all. Kute Nest helps any homeowner — first-time buyers, people upsizing, or those returning to the market after years away.' },
  { q: 'How is this different from a real estate agent?', a: 'We complement agents — we prepare you before you ever walk into a showing. Think of us as your training ground and financial coach.' },
  { q: 'Is my financial data secure?', a: 'Yes. We use bank-level 256-bit encryption and never sell your data to third parties.' },
  { q: 'Can I cancel anytime?', a: 'Absolutely. Cancel your subscription at any time with no fees or penalties.' },
  { q: "What if I have bad credit?", a: "That's exactly why we exist. Our credit coaching module is designed for people starting from scratch or rebuilding." },
];

const marqueeItems = ['Homeownership', 'Dream Home', 'Build Equity', 'Smart Living', 'Your Space', 'Own It', 'Kute Nest', 'Make It Happen', 'Front Door'];

function App() {
  const [openFaq, setOpenFaq] = useState(null);

  return (
    <>
      {/* NAV */}
      <nav className="nav">
        <div className="logo">Kute<span>Nest</span></div>
        <ul className="nav-links">
          <li><a href="#features">Features</a></li>
          <li><a href="#how">How It Works</a></li>
          <li><a href="#pricing">Pricing</a></li>
          <li><a href="#faq">FAQ</a></li>
        </ul>
        <button className="btn-nav" onClick={() => document.getElementById('register').scrollIntoView({behavior:'smooth'})}>Register Now</button>
      </nav>

      {/* HERO */}
      <section className="hero">
        <div className="hero-left">
          <div className="hero-tag">Program Now Open</div>
          <h1>Make your<br/>own home.</h1>
          <p>The no-BS homeownership program. Built for real people — not just the privileged few.</p>
          <button className="btn-dark" onClick={() => document.getElementById('register').scrollIntoView({behavior:'smooth'})}>Register Now →</button>
        </div>
        <div className="hero-right">
          <div className="img-placeholder">
            <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
              <rect x="10" y="22" width="32" height="24" stroke="currentColor" strokeWidth="1.5"/>
              <path d="M5 24L26 7l21 17" stroke="currentColor" strokeWidth="1.5"/>
              <rect x="19" y="32" width="14" height="14" stroke="currentColor" strokeWidth="1.5"/>
            </svg>
            <span>Drop your lifestyle<br/>hero photo here</span>
          </div>
        </div>
      </section>

      {/* MARQUEE */}
      <div className="marquee-wrap">
        <div className="marquee-track">
          {[...marqueeItems, ...marqueeItems, ...marqueeItems].map((item, i) => (
            <span key={i} className="marquee-item">{item}<span className="marquee-dot"></span></span>
          ))}
        </div>
      </div>

      {/* FEATURES */}
      <section className="section" id="features">
        <div className="section-label">What You Get</div>
        <div className="section-title">Everything you need to <em>own it.</em></div>
        <div className="features-grid">
          {features.map((f, i) => (
            <div key={i} className="feature-card">
              <div className="feature-num">0{i + 1}</div>
              <h3>{f.title}</h3>
              <p>{f.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* HOW IT WORKS */}
      <section className="section alt" id="how">
        <div className="section-label">The Process</div>
        <div className="section-title">Four steps to your <em>front door.</em></div>
        <div className="how-grid">
          {steps.map((s, i) => (
            <div key={i} className="how-step">
              <div className="how-num">0{i + 1}</div>
              <h3>{s.title}</h3>
              <p>{s.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* TESTIMONIALS */}
      <section className="section">
        <div className="section-label">Real Stories</div>
        <div className="section-title">Homeowners who <em>made it happen.</em></div>
        <div className="testimonials-grid">
          {testimonials.map((t, i) => (
            <div key={i} className="testimonial-card">
              <p className="testimonial-text">{t.text}</p>
              <div className="testimonial-author">
                <div className="avatar">{t.initial}</div>
                <div>
                  <div className="author-name">{t.name}</div>
                  <div className="author-meta">{t.meta}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* PRICING */}
      <section className="section alt" id="pricing">
        <div className="section-label">Pricing</div>
        <div className="section-title">Pick your <em>path home.</em></div>
        <div className="pricing-grid">
          {plans.map((p, i) => (
            <div key={i} className={`pricing-card ${p.featured ? 'featured' : ''}`}>
              {p.featured && <div className="featured-badge">Most Popular</div>}
              <div className="plan-name">{p.name}</div>
              <div className="plan-price">
                {p.price ? <><sup>$</sup>{p.price}</> : 'Free'}
              </div>
              <div className="plan-period">{p.period}</div>
              <ul className="plan-features">
                {p.features.map((f, j) => <li key={j}>{f}</li>)}
              </ul>
              <button className={`btn-plan ${p.featured ? 'featured-btn' : ''}`}>
                {!p.price ? 'Get Started Free' : 'Register Now'}
              </button>
            </div>
          ))}
        </div>
      </section>

      {/* FAQ */}
      <section className="section" id="faq">
        <div className="section-label">FAQ</div>
        <div className="section-title">Got <em>questions?</em></div>
        <div className="faq-list">
          {faqs.map((f, i) => (
            <div key={i} className="faq-item">
              <div className="faq-q" onClick={() => setOpenFaq(openFaq === i ? null : i)}>
                {f.q}
                <span className="faq-icon">{openFaq === i ? '−' : '+'}</span>
              </div>
              {openFaq === i && <div className="faq-a">{f.a}</div>}
            </div>
          ))}
        </div>
      </section>
